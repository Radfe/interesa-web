  <h2>Zinok - jedna spolahliva kotva v dni</h2>
  <p>Jedna spolahliva kotva v dni vie pri zinku urobit viac nez viacero drobnych pravidiel. Ak je naviazany na moment, ktory sa ti opakuje skoro kazdy den, rutina ma vacsiu sancu prezit aj v neidealnych obdobiach.</p>
  <p>Cielom je menej premyslania a viac automatickosti.</p>
