  <h2>Vitamin C - jedna spolahliva kotva v dni</h2>
  <p>Aj pri vitamine C casto funguje najlepiej jedna spolahliva kotva v dni. Jednoducha a opakovana situacia urobi viac nez snaha vyladit kazdy detail nacasovania.</p>
  <p>Ak sa na nu vies vratit aj v horsom dni, rutina ma realnu sancu vydrzat.</p>
